name: Trading Agent

on:
  schedule:
    - cron: '0 3 * * 1-5'      # 8:30 AM IST — Morning Report
    - cron: '*/15 3-10 * * 1-5' # Har 15 min 9:15-3:15 PM IST — Signals
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install libraries
        run: pip install yfinance feedparser requests pandas pytz

      - name: Morning Report (8:30 AM)
        if: github.event.schedule == '0 3 * * 1-5'
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python trading_agent_1.py

      - name: Intraday Signals (Every 15 min)
        if: github.event.schedule == '*/15 3-10 * * 1-5'
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python trading_agent_1.py signals
