name: Trading Agent v10.0

on:
  schedule:
    # Morning Report — 8:30 AM IST = 3:00 UTC
    - cron: '0 3 * * 1-5'
    # Signals — every 15 min during market hours (single wildcard)
    - cron: '*/15 4-10 * * 1-5'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: morning OR signals'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - signals

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance feedparser requests pandas pytz

      - name: Morning Report
        if: >
          github.event.schedule == '0 3 * * 1-5' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'morning')
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
          ALPHA_KEY: ${{ secrets.ALPHA_KEY }}
        run: python trading_agent_1.py

      - name: Trading Signals
        if: >
          github.event.schedule == '*/15 4-10 * * 1-5' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'signals')
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
          ALPHA_KEY: ${{ secrets.ALPHA_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python trading_agent_1.py signals force
          else
            python trading_agent_1.py signals
          fi
